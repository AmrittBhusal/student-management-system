version: "3.8"

services:
  web:
    image: mysite
    build: 
      context:  .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - .:/code

    ports:
      - "8000:8000"

    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    networks:
      - nw

networks:
  nw:
    driver: bridge


    